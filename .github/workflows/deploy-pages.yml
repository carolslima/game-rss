# =============================================================================
# Game RSS — Deploy to GitHub Pages
# =============================================================================
# Faz deploy do conteúdo de public/ para GitHub Pages usando Actions nativo.
# Dispara automaticamente quando arquivos em public/ são alterados na main.
# =============================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "public/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy public/ to Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
